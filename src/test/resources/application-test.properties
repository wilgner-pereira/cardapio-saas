spring.datasource.url=jdbc:h2:mem:cardapio;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.flyway.enabled=true

api.security.token.secret=test-only-secret-with-at-least-32-characters
api.security.token.access-expiration-ms=900000
api.security.token.refresh-expiration-ms=604800000
api.security.cookie.secure=false
api.security.cookie.same-site=Lax

supabase.url=http://localhost:54321
supabase.key=test-only-supabase-key
supabase.bucket=cardapio-imagens
