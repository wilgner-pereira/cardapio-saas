spring.datasource.url=jdbc:h2:mem:cardapio-dev;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.show-sql=${JPA_SHOW_SQL:false}

api.security.token.secret=${JWT_SECRET:dev-only-secret-change-before-production-32-chars}
api.security.cookie.secure=${COOKIE_SECURE:false}
api.security.cookie.same-site=${COOKIE_SAME_SITE:Lax}

supabase.url=${SUPABASE_URL:http://localhost:54321}
supabase.key=${SUPABASE_KEY:dev-only-supabase-key}
supabase.bucket=${SUPABASE_BUCKET:cardapio-imagens}
