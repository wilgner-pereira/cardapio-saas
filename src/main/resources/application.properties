spring.application.name=cardapio
spring.profiles.active=${SPRING_PROFILES_ACTIVE:supabase}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.flyway.enabled=true

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:5MB}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

api.security.token.issuer=${JWT_ISSUER:cardapio-online}
api.security.token.secret=${JWT_SECRET}
api.security.token.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
api.security.token.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
api.security.cookie.secure=${COOKIE_SECURE:true}
api.security.cookie.same-site=${COOKIE_SAME_SITE:Strict}
api.security.cookie.domain=${COOKIE_DOMAIN:}

supabase.url=${SUPABASE_URL}
supabase.key=${SUPABASE_KEY}
supabase.bucket=${SUPABASE_BUCKET}

app.bootstrap-admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap-admin.username=${APP_BOOTSTRAP_ADMIN_USERNAME:}
app.bootstrap-admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap-admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}
